<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog · Jevel</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    /* ---- NOTAS PAGE ---- */
    .notas-header {
      min-height: 38vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      border-bottom: 2px solid var(--ink);
      padding: 4rem 2rem 3rem;
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .notas-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: repeating-linear-gradient(
        90deg,
        var(--ink) 0px,
        var(--ink) 8px,
        transparent 8px,
        transparent 16px
      );
    }

    .notas-back {
      position: absolute;
      top: 1.4rem;
      left: 1.4rem;
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    .notas-back:hover { color: var(--ink); }
    .notas-back::before { content: '← '; }

    .notas-title-page {
      font-family: var(--font-display);
      font-size: clamp(2.8rem, 7vw, 5rem);
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 0.8rem;
    }

    .notas-subtitle {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mid);
    }

    /* ---- FEED ---- */
    .notas-feed {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 2rem 8rem;
    }

    /* ---- NOTA ---- */
    .nota-entry {
      padding: 4rem 0;
      border-bottom: 1px solid rgba(26,18,9,0.15);
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 0.65s cubic-bezier(0.22,1,0.36,1), transform 0.65s cubic-bezier(0.22,1,0.36,1);
    }

    .nota-entry.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .nota-entry:last-child {
      border-bottom: none;
    }

    .nota-eyebrow {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.4rem;
    }

    .nota-fecha {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--mid);
      letter-spacing: 0.08em;
    }

    .nota-tipo-badge {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      border: 1px solid rgba(26,18,9,0.2);
      padding: 0.18rem 0.5rem;
    }

    .nota-titulo {
      font-family: var(--font-display);
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      line-height: 1.15;
      margin-bottom: 1.8rem;
      letter-spacing: -0.01em;
    }

    .nota-imagen-wrap {
      margin-bottom: 2rem;
      border: 1.5px solid var(--ink);
      box-shadow: 4px 4px 0 var(--ink);
      overflow: hidden;
    }

    .nota-imagen-wrap img {
      width: 100%;
      display: block;
      filter: contrast(1.05) saturate(0.88);
    }

    /* Contenido markdown */
    .nota-contenido {
      font-family: var(--font-body);
      font-size: 1.05rem;
      line-height: 1.9;
      color: var(--ink);
    }

    .nota-contenido p { margin-bottom: 1.2em; }
    .nota-contenido p:last-child { margin-bottom: 0; }
    .nota-contenido em { font-style: italic; }
    .nota-contenido strong { font-weight: 700; }

    .nota-contenido h2 {
      font-family: var(--font-display);
      font-size: 1.4rem;
      margin: 1.8em 0 0.7em;
    }

    .nota-contenido h3 {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 1.4em 0 0.5em;
      color: var(--mid);
    }

    .nota-contenido blockquote {
      border-left: 3px solid var(--ink);
      padding-left: 1.4rem;
      margin: 1.4rem 0;
      font-style: italic;
      color: var(--mid);
    }

    .nota-contenido ul,
    .nota-contenido ol {
      padding-left: 1.5rem;
      margin-bottom: 1em;
    }

    .nota-contenido li { margin-bottom: 0.4em; }

    .nota-link-externo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      color: var(--accent-muted, var(--mid));
      text-decoration: none;
      margin-top: 1.2rem;
      border-bottom: 1px solid currentColor;
      padding-bottom: 0.1rem;
      transition: color 0.2s;
    }

    .nota-link-externo:hover { color: var(--ink); }

    /* Separador ornamental entre notas */
    .nota-ornament {
      text-align: center;
      font-size: 0.9rem;
      color: rgba(26,18,9,0.2);
      padding-top: 0.5rem;
      letter-spacing: 0.3em;
    }

    /* ---- ESTADOS ---- */
    .notas-loading,
    .notas-vacio {
      text-align: center;
      padding: 6rem 2rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--mid);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .notas-vacio .vacio-icon {
      font-size: 2rem;
      display: block;
      margin-bottom: 1rem;
      opacity: 0.25;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 600px) {
      .notas-feed { padding: 0 1.2rem 6rem; }
      .nota-entry { padding: 3rem 0; }
    }
  </style>
</head>
<body>

  <header class="notas-header">
    <a href="index.html" class="notas-back">Jevel</a>
    <h1 class="notas-title-page">Blog</h1>
  </header>

  <main class="notas-feed" id="notasFeed">
    <div class="notas-loading">Cargando notas…</div>
  </main>

  <footer class="footer">
    <div class="footer-logo-wrap"><img src="logolapiz.png" alt="Jevel" class="footer-logo" /></div>
    <p class="footer-text">Jevel · 2026 · Buenos Aires</p>
  </footer>

  <script>
    function formatFecha(str) {
      if (!str) return '';
      const d = new Date(str + 'T12:00:00');
      return d.toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function labelTipo(tipo) {
      const labels = { texto: 'Texto', imagen: 'Imagen', mezcla: 'Mezcla', link: 'Link' };
      return labels[tipo] || tipo;
    }

    async function cargarNotas() {
      const feed = document.getElementById('notasFeed');
      try {
        const res = await fetch('notas-data.json');
        if (!res.ok) throw new Error('no data');
        const notas = await res.json();
        const ordenadas = notas.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        renderNotas(ordenadas);
      } catch (e) {
        feed.innerHTML = `
          <div class="notas-vacio">
            <span class="vacio-icon">✦</span>
            Todavía no hay notas publicadas.
          </div>`;
      }
    }

    function renderNotas(notas) {
      const feed = document.getElementById('notasFeed');

      if (!notas.length) {
        feed.innerHTML = `
          <div class="notas-vacio">
            <span class="vacio-icon">✦</span>
            Todavía no hay notas publicadas.
          </div>`;
        return;
      }

      feed.innerHTML = notas.map((nota, i) => `
        <article class="nota-entry" style="transition-delay: ${i * 80}ms">
          <div class="nota-eyebrow">
            <span class="nota-fecha">${formatFecha(nota.fecha)}</span>
            <span class="nota-tipo-badge">${labelTipo(nota.tipo)}</span>
          </div>
          ${nota.titulo ? `<h2 class="nota-titulo">${nota.titulo}</h2>` : ''}
          ${nota.imagen ? `<div class="nota-imagen-wrap"><img src="${nota.imagen}" alt="${nota.titulo || ''}" loading="lazy" /></div>` : ''}
          <div class="nota-contenido">${nota.body ? marked.parse(nota.body) : ''}</div>
          ${nota.url_link ? `<a href="${nota.url_link}" target="_blank" rel="noopener" class="nota-link-externo">${nota.texto_link || nota.url_link} →</a>` : ''}
        </article>
      `).join('');

      // Scroll reveal
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.04, rootMargin: '0px 0px -20px 0px' });

      document.querySelectorAll('.nota-entry').forEach(el => observer.observe(el));
    }

    cargarNotas();
  </script>

</body>
</html>
